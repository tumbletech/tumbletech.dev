  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumbletech</title>
  <link rel="icon" type="image/png" href="/assets/img/002.favicon.png">
  <link href="./main.css" rel="stylesheet">
  <style>
    @keyframes pop {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    @keyframes orbit {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    .animate-pop-center {
      animation: pop 0.6s ease-out forwards;
    }
    .animate-orbit {
      animation: orbit 0.6s ease-out forwards;
    }
    .animate-orbit.delay-100 {animation-delay: 0.1s;}
    .animate-orbit.delay-200 {animation-delay: 0.2s;}
    .animate-orbit.delay-300 {animation-delay: 0.3s;}
    .animate-orbit.delay-400 {animation-delay: 0.4s;}
    .animate-orbit.delay-500 {animation-delay: 0.5s;}

    .circle-frame {
      border-radius: 9999px;
      border: 3px solid #00fefb;
      padding: 10px;
    }

    .orbit-line {
      position: absolute;
      width: 2px;
      background-color: #00fefb;
      transform-origin: bottom-center;
    }
  </style>
</head>
