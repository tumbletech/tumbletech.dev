<!doctype html>
<html lang="en">
  <head>
    <!--- ========================================================= ----
          Name of Project:  Tumbletech Main Website
          Date:             April 8, 2025
          Project ID:       00-0000

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumbletech</title>
    <link rel="icon" type="image/png" href="/assets/img/002.favicon.png">
    <link href="./main.css" rel="stylesheet">
    <style>
      body {
      background: black;
      color: #00fefb;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    nav {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-links a {
      margin-left: 1rem;
      text-decoration: none;
      color: #00fefb;
      font-weight: 500;
    }
    .landing {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 90vh;
      text-align: center;
    }
    .logo {
      width: 150px;
      margin-bottom: 2rem;
    }
    .scroll-text {
      position: relative;
      height: 3rem;
      overflow: hidden;
      font-size: 2rem;
      font-weight: bold;
    }
    .scroll-text span {
      display: block;
      animation: scroll 12s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateY(0%); }
      16.66% { transform: translateY(-100%); }
      33.32% { transform: translateY(-200%); }
      49.98% { transform: translateY(-300%); }
      66.64% { transform: translateY(-400%); }
      83.30% { transform: translateY(-500%); }
      100% { transform: translateY(0%); }
    }
    </style>
  </head>
  <body class="bg-white text-gray-800 font-sans">
    <!--- Navigation Bar --->
    <nav class="flex justify-between items-center p-6 bg-black shadow-md sticky top-0 z-50">
      <div class="flex items-center">
        <img src="/assets/img/001.mainlogo-b.png" alt="Tumbletech-Logo" class="h-10 mr-3">
      </div>
      <ul class="flex space-x-6 font-medium">
        <li><a href="#" class="text-[#00fefb] hover:opacity-80 transition-opacity">Home</a></li>
        <li><a href="#" class="text-[#00fefb] hover:opacity-80 transition-opacity">Products</a></li>
        <li><a href="#" class="text-[#00fefb] hover:opacity-80 transition-opacity">Roadmap</a></li>
        <li><a href="#" class="text-[#00fefb] hover:opacity-80 transition-opacity">About</a></li>
        <li><a href="#" class="text-[#00fefb] hover:opacity-80 transition-opacity">Contact</a></li>
      </ul>
    </nav>

    <!---- Hero Section --->

    <!--<header class="min-h-screen flex flex-col justify-center items-center bg-gradient-to-br from-blue-900 to-indigo-900 text-white px-6 text-center">

      <p class="text-lg md:text-xl max-w-2xl">Tumbletech builds powerful, no-nonsense SaaS tools. Build to empower. Built to launch.</p>

    <!--- Services Orbit Section --->
    <section class="landing">
      <img src="/assets/img/002.favicon.png" alt="Tumbletech Logo" class="logo">
      <!-- Scrolling Text -->
      <div class="relative h-12 overflow-hidden w-80 text-center">
        <div class="carousel-track text-5xl font-semibold">
          <span class="carousel-item">Website & App Development</span>
          <span class="carousel-item">AI Agents Building</span>
          <span class="carousel-item">Infrastructure as a Business</span>
          <span class="carousel-item">Data Visualization & Dashboards</span>
          <span class="carousel-item">Automation & Integration</span>
          <span class="carousel-item">Custom Client Portals</span>
        </div>
      </div>
    </section>
  </body>
